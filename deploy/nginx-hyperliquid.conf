# ─────────────────────────────────────────────────────────────────────
# nginx server block STANDALONE per Hyperliquid Platform.
#
# Questo file NON modifica alcuna config esistente.
# Va salvato come file separato: /etc/nginx/sites-available/hyperliquid
# Poi linkato:                    /etc/nginx/sites-enabled/hyperliquid
#
# `trade.fondamentale` resta INTOCCATO sui suoi file nginx (se esistono).
#
# Sostituisci HL_DOMAIN con il tuo sottodominio (es: hl.tuodominio.com).
# Sostituisci SSL_* con i path dei certificati (Let's Encrypt genera in
#   /etc/letsencrypt/live/HL_DOMAIN/fullchain.pem e privkey.pem)
# ─────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name HL_DOMAIN;
    return 301 https://$host$request_uri;
}

# HTTPS — server block isolato per Hyperliquid
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name HL_DOMAIN;

    # Certificati (gestiti da certbot dopo `certbot --nginx -d HL_DOMAIN`)
    ssl_certificate     /etc/letsencrypt/live/HL_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/HL_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Log dedicati (separati da quelli di trade.fondamentale)
    access_log /var/log/nginx/hyperliquid-access.log;
    error_log  /var/log/nginx/hyperliquid-error.log warn;

    # Security headers
    add_header X-Frame-Options       "DENY"                always;
    add_header X-Content-Type-Options "nosniff"            always;
    add_header Referrer-Policy       "no-referrer"         always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Basic auth obbligatoria
    auth_basic           "Hyperliquid Platform";
    auth_basic_user_file /etc/nginx/.hl-htpasswd;

    # Body size: backtest/all può ritornare ~5MB JSON
    client_max_body_size 10M;

    # Tutto reverse proxy al backend Docker (bind 127.0.0.1:7777)
    # Il backend serve sia gli statici (web-dist) sia le API REST.
    location / {
        proxy_pass         http://127.0.0.1:7777;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Gzip dei JSON di response (riduce ~5MB di backtest a ~500KB)
        gzip            on;
        gzip_types      application/json text/plain text/css application/javascript;
        gzip_min_length 1024;
    }
}
